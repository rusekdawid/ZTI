<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">
<head><title>IGNORED</title></head>
<body>
<ui:composition template="/templates/masterTemplate.xhtml">
    <ui:define name="windowTitle">#{msg.siteTitle}</ui:define>
    <ui:define name="content">
        <div id="content">
            <h3>#{msg.titleFormList}</h3>
            <h:form>
                <h:dataTable value="#{personBean.people}" var="record" border="1">
                    <h:column>
                        <f:facet name="header"><h:outputText value="#{msg.Lastname}"/></f:facet>
                        <h:outputText value="#{record.lname}"/>
                    </h:column>
                    <h:column>
                        <f:facet name="header"><h:outputText value="#{msg.Firstname}"/></f:facet>
                        <h:outputText value="#{record.fname}"/>
                    </h:column>
                    <h:column>
                        <f:facet name="header"><h:outputText value="#{msg.Email}"/></f:facet>
                        <h:outputText value="#{record.email}"/>
                    </h:column>
                    <h:column>
                        <f:facet name="header"><h:outputText value="#{msg.Type}"/></f:facet>
                        <h:outputText value="#{record.type}"/>
                    </h:column>
                    <h:column>
                        <f:facet name="header"><h:outputText value="#{msg.actionFormList}"/></f:facet>
                        [<h:commandLink id="View" action="view" actionListener="#{personBean.selectPerson}">
                            <h:outputText value="#{msg.viewLinkFormList}"/>
                            <f:param id="editId" name="id" value="#{record.id}"/>
                        </h:commandLink>]
                        [<h:commandLink id="Edit" action="update" actionListener="#{personBean.selectPerson}">
                            <h:outputText value="#{msg.editLinkFormList}"/>
                            <f:param id="editId" name="id" value="#{record.id}"/>
                        </h:commandLink>]
                        [<h:commandLink id="Delete" action="list" actionListener="#{personBean.deletePerson}">
                            <h:outputText value="#{msg.delLinkFormList}"/>
                            <f:param id="deleteId" name="id" value="#{record.id}"/>
                        </h:commandLink>]
                    </h:column>
                </h:dataTable>
            </h:form>
        </div>
    </ui:define>
</ui:composition>
</body>
</html>
